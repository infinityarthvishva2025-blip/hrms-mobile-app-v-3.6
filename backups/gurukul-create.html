


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Gurukul Video</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6ff;
            padding: 30px;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            color: #283593;
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: #3949ab;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2>🎬 Add Gurukul Video</h2>

        <form id="videoForm">
 BASIC INFO 
<label>Main Title Group</label>
<input type="text" id="TitleGroup">

<label>Category</label>
<input type="text" id="Category">

<label>Video Title *</label>
<input type="text" id="Title" required>

<label>Description</label>
<textarea id="Description"></textarea>
 PERMISSIONS 
<label>Limit to Department</label>
<input type="text" id="AllowedDepartment" placeholder="Leave empty for all">

<label>Limit to Specific Employee ID</label>
<input type="number" id="AllowedEmployeeId">
 VIDEO 
<label>Upload MP4 File</label>
            <input type="file" id="VideoFile" accept="video/*">

            <label>External Link</label>
            <input type="text" id="ExternalLink">

            <button type="submit">Save Video</button>

            <div id="error" class="error"></div>
        </form>

    </div>

    <script>

document.getElementById("videoForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const token = localStorage.getItem("token");
    const errorDiv = document.getElementById("error");
    errorDiv.innerText = "";

    if (!token) {
        errorDiv.innerText = "Not authenticated";
        return;
    }

    const formData = new FormData();

    formData.append("TitleGroup", document.getElementById("TitleGroup").value);
    formData.append("Category", document.getElementById("Category").value);
    formData.append("Title", document.getElementById("Title").value);
    formData.append("Description", document.getElementById("Description").value);

    const dept = document.getElementById("AllowedDepartment").value;
    const emp = document.getElementById("AllowedEmployeeId").value;

    if (dept) formData.append("AllowedDepartment", dept);
    if (emp) formData.append("AllowedEmployeeId", emp);

    const fileInput = document.getElementById("VideoFile");
    if (fileInput.files.length > 0) {
        formData.append("VideoFile", fileInput.files[0]);
    }

    const external = document.getElementById("ExternalLink").value;
    if (external) {
        formData.append("ExternalLink", external);
    }

    try {
        const response = await fetch("/api/GurukulApi/hr/videos", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            },
            body: formData
        });

        if (!response.ok) {
            errorDiv.innerText = "Failed to save video";
            return;
        }

        alert("Video saved successfully!");
        window.location.href = "/dashboard.html";

    } catch (err) {
        errorDiv.innerText = "Server error";
    }

});

    </script>

</body>
</html>
