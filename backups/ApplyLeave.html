 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply for Leave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .leave-title {
            font-size: 1.6rem;
            font-weight: 600;
        }

        .leave-card {
            border-radius: 16px;
            background: #fff;
            padding: 35px;
            max-width: 650px;
            margin: auto;
            box-shadow: 0 3px 18px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="leave-card">

            <div class="leave-title">Apply for Leave</div>
            <hr />

            <form id="leaveForm">

                <!-- CATEGORY -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Leave Category</label>
                        <select id="Category" class="form-select">
                            <option value="">-- Select --</option>
                            <option value="0">Full Day</option>
                            <option value="1">More Than 1 Day</option>
                            <option value="2">Half Day</option>
                            <option value="3">Early Going</option>
                            <option value="4">Late Coming</option>
                            <!--<option value="">-- Select --</option>
                            <option value="FullDay">Full Day</option>
                            <option value="MultiDay">More Than 1 Day</option>
                            <option value="HalfDay">Half Day</option>
                            <option value="EarlyGoing">Early Going</option>
                            <option value="LateComing">Late Coming</option>-->
                        </select>
                    </div>

                    <div id="leaveTypeBlock" class="col-md-6 d-none">
                        <label class="form-label">Leave Type</label>
                        <select id="LeaveType" class="form-select">
                            <option value="">-- Select Leave Type --</option>
                            <option value="Sick">Sick</option>
                            <option value="Casual">Casual</option>
                            <option value="coff">Comp-Off</option>
                        </select>
                    </div>
                </div>

                <!-- COMP-OFF DATE -->
                <div id="compOffDateBlock" class="row mb-3 d-none">
                    <div class="col-md-6">
                        <label class="form-label">Comp-Off Earned Date</label>
                        <input type="date" id="CompOffDate" class="form-control">
                    </div>
                </div>

                <!-- FULL / MULTI DAY -->
                <div id="fullOrMultiDayBlock" class="row mb-3 d-none">
                    <div class="col-md-6">
                        <label>Start Date</label>
                        <input type="date" id="StartDate" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label>End Date</label>
                        <input type="date" id="EndDate" class="form-control">
                    </div>
                </div>

                <!-- HALF DAY -->
                <div id="halfDayBlock" class="row mb-3 d-none">
                    <div class="col-md-6">
                        <label>Date</label>
                        <input type="date" id="HalfDayDate" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label>Session</label>
                        <select id="HalfDaySession" class="form-select">
                            <option value="">-- Select --</option>
                            <option value="FirstHalf">First Half</option>
                            <option value="SecondHalf">Second Half</option>
                        </select>
                    </div>
                </div>

                <!-- TIME BASED -->
                <div id="timeBlock" class="row mb-3 d-none">
                    <div class="col-md-6">
                        <label>Date</label>
                        <input type="date" id="TimeDate" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label>Time</label>
                        <input type="time" id="TimeValue" class="form-control">
                    </div>
                </div>

                <!-- REASON -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label>Reason</label>
                        <textarea id="Reason" class="form-control"></textarea>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        Submit Leave
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const category = document.getElementById("Category");
            const leaveType = document.getElementById("LeaveType");

            const toggle = (el, show) => el.classList.toggle("d-none", !show);

            category.addEventListener("change", () => {
                toggle(fullOrMultiDayBlock, false);
                toggle(halfDayBlock, false);
                toggle(timeBlock, false);
                toggle(leaveTypeBlock, false);
                toggle(compOffDateBlock, false);

                if (category.value === "0" || category.value === "1") {
                    toggle(fullOrMultiDayBlock, true);
                    toggle(leaveTypeBlock, true);
                }
                else if (category.value === "2") {
                    toggle(halfDayBlock, true);
                }
                else if (category.value === "3" || category.value === "4") {
                    toggle(timeBlock, true);
                }
            });

            leaveType.addEventListener("change", () => {
                toggle(compOffDateBlock, leaveType.value === "coff");
            });
        });
